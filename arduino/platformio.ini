[env:m5stack-sticks3]
platform = espressif32@6.12.0
board = m5stack-sticks3
framework = arduino
monitor_speed = 115200
board_build.arduino.memory_type = qio_opi
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
lib_deps =
    m5stack/M5Unified@^0.2.17
    bitbank2/AnimatedGIF@^1.4.9
